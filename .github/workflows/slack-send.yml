name: Slack Send

on:
  push:
    paths:
      - 'slack-request.txt'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
  - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install slack-sdk

      - name: Send message
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python scripts/slack_send.py

- name: Commit response
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/contents/slack-response.txt \
            -f message="slack response" \
            -f content="$(base64 -w 0 slack-response.txt)" \
            -f sha="$(gh api /repos/${{ github.repository }}/contents/slack-response.txt --jq '.sha' 2>/dev/null || echo '')"
